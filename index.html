<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080a0b">
  <meta name="description" content="A private, offline-ready command center for rideshare earnings, mileage, goals, and vehicle costs.">
  <title>Uber Driver Command Center</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.png" sizes="32x32">
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Driver Command">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="styles.css">
  <script defer src="core.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to dashboard</a>

  <div class="app-shell" id="appShell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none">
            <rect x="3" y="3" width="42" height="42" rx="14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M14 30.5 23 25l7 4 7-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M31 21h6v6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Driver Command</div>
          <div class="brand-kicker">Uber dashboard</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav"></nav>

      <div class="sidebar-footer">
        <div class="privacy-card">
          <span class="privacy-icon" aria-hidden="true">●</span>
          <div>
            <strong>Private by default</strong>
            <span>Your data stays in this browser.</span>
          </div>
        </div>
        <div class="version-label" id="versionLabel"></div>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div class="mobile-brand" aria-label="Driver Command">
          <span class="mobile-brand-mark" aria-hidden="true">
            <svg viewBox="0 0 36 36" fill="none">
              <rect x="2" y="2" width="32" height="32" rx="11" stroke="currentColor" stroke-width="2"/>
              <path d="M10 23 17 19l5 3 5-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M23 16h4v4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>

        <div class="page-heading">
          <div class="page-eyebrow" id="pageEyebrow">Command center</div>
          <h1 id="pageTitle">Overview</h1>
          <p id="pageSubtitle">Your earnings, efficiency, and goals at a glance.</p>
        </div>

        <div class="topbar-actions">
          <div class="connection-pill" id="connectionPill" title="Connection status">
            <span></span><b>Local</b>
          </div>
          <button class="icon-button" type="button" data-action="toggle-theme" id="themeToggle" aria-label="Switch color theme"></button>
          <button class="button button-primary topbar-add" type="button" data-action="open-add-shift">
            <span class="button-icon" id="topbarAddIcon" aria-hidden="true"></span>
            <span>Add shift</span>
          </button>
        </div>
      </header>

      <main class="main-content" id="mainContent" tabindex="-1"></main>
    </div>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation"></nav>

  <div id="modalRoot"></div>
  <div class="toast-region" id="toastRoot" aria-live="polite" aria-atomic="true"></div>

  <input class="visually-hidden" type="file" id="importFileInput" accept=".json,.csv,application/json,text/csv">
</body>
</html>
